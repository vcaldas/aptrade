<!-- templates/files.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
</head>

<body>

    <h1>Upload - rev2</h1>

    <form action="/api/upload" method="POST" enctype="multipart/form-data">

        <label for="user_file">Upload Your File</label>
        <br></br>
        <input type="file" name="user_file">
        <br></br>
        <button type="submit">Upload</button>

    </form>

    <h1>Download</h1>
    <table>
        <caption>Example table with config values</caption>
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Value</th>
          </tr>
        {% for i in files %}
        <tr>
            <td><a href="/api/download/{{ i['Key'] }}">{{ i['Key'] }}</a></td>
            <td><a href="/api/predict/{{ i['Key'] }}">{{ i['Key'] }}</a></td>
        </tr>
        {% endfor %}
    </table>


    <form action="/api/predict" method="POST" enctype="multipart/form-data">

        <label for="user_file">Upload Your for training</label>
        <br></br>
        <input type="file" name="user_file">
        <br></br>
        <button type="submit">Train</button>

    </form>


</body>

</html>
